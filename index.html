<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<title>🇰🇿 哈薩克 9天8夜</title>
<style>
:root{--bg:#F5F0E8;--bg2:#EDE7DB;--card:#FFFFFF;--card2:#FAF7F2;--border:#E0D8CC;--txt:#2D2A24;--txt2:#4A453B;--dim:#8C8578;--dim2:#A69F93;--acc:#C2612C;--acc2:#D4763F;--accbg:#FDF0E8;--blue:#3573B5;--green:#3A8B5C;--purple:#7E57A0;--gold:#B8860B;--warn:#C0392B;--ok:#2E7D4B}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,'PingFang TC','Noto Sans TC','Helvetica Neue',sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%;font-size:16px;line-height:1.6}
::-webkit-scrollbar{display:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
.wrap{max-width:500px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}
.mono{font-family:'SF Mono','Menlo','Courier New',monospace}
.hdr{padding:max(16px,env(safe-area-inset-top,16px)) 20px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:12px;padding:4px}
.tab{padding:8px 18px;border-radius:10px;font-size:15px;font-weight:600;background:transparent;color:var(--dim);transition:all .2s}
.tab.on{background:var(--card);color:var(--acc);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.days{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border)}
.dbtn{flex-shrink:0;width:56px;padding:8px 0;border-radius:14px;text-align:center;background:var(--bg2);color:var(--dim);border:2px solid transparent;transition:all .2s;font-size:inherit}
.dbtn:active{transform:scale(.93)}
.dbtn.on{color:var(--txt);background:var(--card);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.hero{margin:16px 20px 14px;border-radius:18px;overflow:hidden;position:relative;min-height:110px}
.hero-bg{position:absolute;inset:0;opacity:.92}
.hero-c{position:relative;z-index:1;padding:18px 20px;height:100%;display:flex;flex-direction:column;justify-content:space-between;color:#fff}
.filters{display:flex;gap:8px;padding:0 20px 10px;overflow-x:auto;flex-wrap:wrap}
.filt{padding:6px 14px;border-radius:20px;font-size:14px;font-weight:600;background:var(--bg2);color:var(--dim);transition:all .15s;border:1px solid var(--border)}
.filt:active{transform:scale(.95)}
.filt.on{border-color:var(--acc);color:var(--acc);background:var(--accbg)}
.timeline{padding:6px 20px 0;position:relative}
.tl-line{position:absolute;left:31px;top:0;bottom:0;width:2px;border-radius:1px}
.spot{position:relative;margin-bottom:12px;padding-left:26px;animation:fadeUp .35s ease both}
.dot{position:absolute;left:5px;top:18px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg);transition:all .2s}
.dot.on{animation:pulse 1.5s ease infinite}
.sc{background:var(--card);border-radius:16px;padding:14px 16px;border:1px solid var(--border);transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sc.on{border-color:var(--acc);box-shadow:0 2px 8px rgba(194,97,44,.12)}
.detail{margin-top:10px;animation:fadeUp .2s ease}
.detail-inner{font-size:15px;color:var(--txt2);line-height:1.75;padding:12px 14px;background:var(--card2);border-radius:12px;border-left:3px solid var(--acc2)}
.tips{margin:10px 20px 0;background:var(--card);border-radius:16px;padding:14px 16px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.bgrid{margin:14px 20px 0;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.bgcell{background:var(--card);border-radius:12px;padding:10px 4px;text-align:center;border:1px solid var(--border)}
.swp{text-align:center;padding:18px 0;padding-bottom:max(20px,env(safe-area-inset-bottom,20px));font-size:13px;color:var(--dim2)}
.ring-wrap{text-align:center;margin-bottom:20px}
.ring-box{position:relative;width:150px;height:150px;margin:0 auto}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.bday{display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--card);border-radius:14px;padding:12px 14px;border:1px solid var(--border);animation:fadeUp .35s ease both;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.bbar{height:6px;border-radius:3px;background:var(--bg2);overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width .6s}
.visa-box{background:var(--card);border-radius:16px;padding:16px;margin:16px 0;border:1px solid #E8D5A0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sum-box{background:var(--card);border-radius:18px;padding:18px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.warn-box{font-size:14px;color:var(--warn);margin-top:12px;line-height:1.7;padding:10px 12px;background:#FEF2F0;border-radius:10px;border:1px solid #F5D5D0}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
</style>
</head>

const VL=5760,VV=3840,FL=29710,TOT=80000;
const tC={highlight:"#C2612C",food:"#9E3A3A",transport:"#3573B5",sight:"#7E57A0",hotel:"#3A8B5C",arrival:"#3A8B5C"};
const tL={highlight:"精華",food:"餐飲",transport:"交通",sight:"景點",hotel:"住宿",arrival:"抵達"};
const dT=b=>b.tk+b.tr+b.fd+b.ht+b.ot;
const fm=n=>n>=1000?(n/1000).toFixed(n%1000===0?0:1)+"K":""+n;
const tripT=D.reduce((s,d)=>s+dT(d.bg),0),allT=tripT+VL+VV,remain=TOT-FL-allT;
let cD=0,cE=null,cT="trip",cF="all",tx=0,ty=0;
function R(){const d=D[cD],fs=cF==="all"?d.sp:d.sp.filter(s=>s.g===cF),A=document.getElementById("app");
let h=`<div class="hdr"><div><div style="font-size:12px;color:var(--acc);letter-spacing:2px;font-weight:700" class="mono">KAZAKHSTAN 2026</div><div style="font-size:20px;font-weight:800;margin-top:2px">🇰🇿 哈薩克 9天8夜</div></div><div class="tabs"><button class="tab ${cT==="trip"?"on":""}" onclick="sT('trip')">📅 行程</button><button class="tab ${cT==="budget"?"on":""}" onclick="sT('budget')">💰 預算</button></div></div>`;
if(cT==="trip"){h+=`<div class="days">`;D.forEach((dd,i)=>{h+=`<button class="dbtn ${cD===i?"on":""}" style="${cD===i?`border-color:${dd.cl}`:""}" onclick="gD(${i})"><div style="font-size:18px">${dd.ic}</div><div class="mono" style="font-size:13px;font-weight:700">${dd.n}</div><div style="font-size:10px;opacity:.5">${dd.dt}</div></button>`});h+=`</div>`;
h+=`<div class="hero"><div class="hero-bg" style="background:${d.gr}"></div><div class="hero-c"><div><div class="mono" style="font-size:12px;opacity:.7;letter-spacing:2px">DAY ${d.n} — ${d.dt} (${d.wd})</div><div style="font-size:22px;font-weight:900;margin-top:4px">${d.ic} ${d.th}</div></div><div style="display:flex;justify-content:space-between;font-size:14px;opacity:.8"><span>📍 ${d.ct}</span><span>🌡️ ${d.wx}</span></div></div></div>`;
const tags=[...new Set(d.sp.map(s=>s.g))];h+=`<div class="filters"><button class="filt ${cF==="all"?"on":""}" onclick="sF('all')">全部</button>`;tags.forEach(tag=>{h+=`<button class="filt ${cF===tag?"on":""}" style="${cF===tag?`border-color:${tC[tag]};color:${tC[tag]};background:${tC[tag]}10`:""}" onclick="sF('${tag}')">${tL[tag]}</button>`});h+=`</div>`;
h+=`<div class="timeline"><div class="tl-line" style="background:${d.cl}20"></div>`;fs.forEach((s,i)=>{const o=cE===i;h+=`<div class="spot" style="animation-delay:${i*.04}s" onclick="tE(${i})"><div class="dot ${o?"on":""}" style="background:${o?d.cl:tC[s.g]||d.cl};${o?`box-shadow:0 0 10px ${d.cl}44`:""}"></div><div class="sc ${o?"on":""}"><div style="display:flex;justify-content:space-between;align-items:center"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-size:13px;color:${d.cl};font-weight:700">${s.t}</span><span style="font-size:11px;color:${tC[s.g]};font-weight:700">${tL[s.g]}</span></div><div style="font-size:16px;font-weight:700;margin-top:4px;color:var(--txt);line-height:1.4">${s.i} ${s.n}</div></div><div style="flex-shrink:0;margin-left:10px;text-align:right">${s.c>0?`<span class="mono" style="font-size:13px;color:var(--gold);font-weight:700">$${fm(s.c)}</span>`:""}<div style="font-size:18px;color:var(--dim2);transition:transform .2s;transform:rotate(${o?90:0}deg)">›</div></div></div>${o?`<div class="detail"><div class="detail-inner" style="border-left-color:${d.cl}88">${s.d}</div></div>`:""}</div></div>`});h+=`</div>`;
if(d.tp.length){h+=`<div class="tips"><div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--gold)">💡 小提醒</div>`;d.tp.forEach(t=>{h+=`<div style="font-size:15px;color:var(--txt2);margin-bottom:5px;padding-left:8px;line-height:1.6">• ${t}</div>`});h+=`</div>`}
h+=`<div class="bgrid">`;[{l:"門票",v:d.bg.tk,e:"🎫"},{l:"交通",v:d.bg.tr,e:"🚗"},{l:"餐飲",v:d.bg.fd,e:"🍽️"},{l:"住宿",v:d.bg.ht,e:"🏨"},{l:"其他",v:d.bg.ot,e:"📦"}].forEach(it=>{h+=`<div class="bgcell"><div style="font-size:16px">${it.e}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">${it.l}</div><div class="mono" style="font-size:12px;font-weight:700;color:${it.v>0?"var(--txt)":"var(--border)"};margin-top:2px">${it.v>0?"$"+fm(it.v):"—"}</div></div>`});h+=`</div><div class="swp">← 左右滑動切換天數 →</div>`}
else{h+=`<div style="height:calc(100vh - 60px);overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch">`;const p1=(allT/TOT)*264,p2=(FL/TOT)*264;h+=`<div class="ring-wrap"><div class="ring-box"><svg viewBox="0 0 100 100" style="transform:rotate(-90deg)"><circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg2)" stroke-width="8"/><circle cx="50" cy="50" r="42" fill="none" stroke="var(--acc)" stroke-width="8" stroke-dasharray="${p1} 264" stroke-linecap="round"/><circle cx="50" cy="50" r="42" fill="none" stroke="var(--warn)" stroke-width="8" stroke-dasharray="${p2} 264" stroke-dashoffset="${-p1}" stroke-linecap="round"/></svg><div class="ring-center"><div style="font-size:11px;color:var(--dim)">剩餘</div><div class="mono" style="font-size:22px;font-weight:800;color:${remain<10000?"var(--warn)":"var(--ok)"}">${remain.toLocaleString()}</div><div style="font-size:11px;color:var(--dim)">TWD</div></div></div><div style="display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:12px;color:var(--dim)"><span>🟠哈薩克</span><span>🔴機票</span><span>⚪未用</span></div></div>`;
h+=`<div style="font-size:16px;font-weight:700;margin-bottom:10px">📊 每日費用</div>`;D.forEach((dd,i)=>{const dt=dT(dd.bg);h+=`<div class="bday" style="animation-delay:${i*.03}s"><div style="width:38px;text-align:center;flex-shrink:0"><div style="font-size:16px">${dd.ic}</div><div style="font-size:10px;color:var(--dim)">D${dd.n}</div></div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:3px">${dd.th}</div><div class="bbar"><div class="bfill" style="background:${dd.gr};width:${Math.min((dt/8000)*100,100)}%"></div></div></div><div class="mono" style="font-size:14px;font-weight:700;color:var(--acc);flex-shrink:0;min-width:52px;text-align:right">${dt.toLocaleString()}</div></div>`});
h+=`<div class="visa-box"><div style="font-size:15px;font-weight:700;color:var(--gold);margin-bottom:8px">🛂 簽證費用</div>`;[{l:"邀請函LOI（已付）",v:VL},{l:"eVisa/落地簽（預估）",v:VV}].forEach(r=>{h+=`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span style="color:var(--dim)">${r.l}</span><span class="mono" style="font-weight:600">${r.v.toLocaleString()}</span></div>`});h+=`</div>`;
h+=`<div class="sum-box"><div style="font-size:14px;color:var(--dim);margin-bottom:10px">💰 全程預算 (TWD)</div>`;[{l:"總預算",v:TOT,c:"var(--txt)",s:"+"},{l:"機票",v:FL,c:"var(--warn)",s:"−"},{l:"哈薩克含簽證",v:allT,c:"var(--warn)",s:"−"}].forEach(r=>{h+=`<div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:6px"><span style="color:var(--txt2)">${r.l}</span><span class="mono" style="font-weight:700;color:${r.c}">${r.s}${r.v.toLocaleString()}</span></div>`});h+=`<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:16px;font-weight:800">剩餘（烏茲別克12天）</span><span class="mono" style="font-size:22px;font-weight:800;color:${remain<10000?"var(--warn)":"var(--ok)"}">${remain.toLocaleString()}</span></div>`;if(remain<10000)h+=`<div class="warn-box">⚠️ 烏茲別克段預算緊。建議：Tour省TWD 2-3K、住宿TWD 600-700/晚、取消高價晚餐省TWD 500+。</div>`;h+=`</div><div style="height:max(30px,env(safe-area-inset-bottom,30px))"></div></div>`}
A.innerHTML=h}
window.gD=function(i){cD=i;cE=null;cF="all";R()};window.sT=function(t){cT=t;R()};window.sF=function(f){cF=cF===f&&f!=="all"?"all":f;R()};window.tE=function(i){cE=cE===i?null:i;R()};
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener("touchend",e=>{if(cT!=="trip")return;const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx<0&&cD<8){cD++;cE=null;cF="all";R()}if(dx>0&&cD>0){cD--;cE=null;cF="all";R()}}},{passive:true});
R();
</script>
</body>
</html>
