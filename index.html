<style>
:root{--bg:#F5F0E8;--bg2:#EDE7DB;--card:#FFFFFF;--card2:#FAF7F2;--border:#E0D8CC;--txt:#2D2A24;--txt2:#4A453B;--dim:#8C8578;--dim2:#A69F93;--acc:#C2612C;--acc2:#D4763F;--accbg:#FDF0E8;--blue:#3573B5;--green:#3A8B5C;--purple:#7E57A0;--gold:#B8860B;--warn:#C0392B;--ok:#2E7D4B}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,'PingFang TC','Noto Sans TC','Helvetica Neue',sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%;font-size:16px;line-height:1.6}
::-webkit-scrollbar{display:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
.wrap{max-width:500px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}
.mono{font-family:'SF Mono','Menlo','Courier New',monospace}
.hdr{padding:max(16px,env(safe-area-inset-top,16px)) 20px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:12px;padding:4px}
.tab{padding:8px 18px;border-radius:10px;font-size:15px;font-weight:600;background:transparent;color:var(--dim);transition:all .2s}
.tab.on{background:var(--card);color:var(--acc);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.days{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border)}
.dbtn{flex-shrink:0;width:56px;padding:8px 0;border-radius:14px;text-align:center;background:var(--bg2);color:var(--dim);border:2px solid transparent;transition:all .2s;font-size:inherit}
.dbtn:active{transform:scale(.93)}
.dbtn.on{color:var(--txt);background:var(--card);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.hero{margin:16px 20px 14px;border-radius:18px;overflow:hidden;position:relative;min-height:110px}
.hero-bg{position:absolute;inset:0;opacity:.92}
.hero-c{position:relative;z-index:1;padding:18px 20px;height:100%;display:flex;flex-direction:column;justify-content:space-between;color:#fff}
.filters{display:flex;gap:8px;padding:0 20px 10px;overflow-x:auto;flex-wrap:wrap}
.filt{padding:6px 14px;border-radius:20px;font-size:14px;font-weight:600;background:var(--bg2);color:var(--dim);transition:all .15s;border:1px solid var(--border)}
.filt:active{transform:scale(.95)}
.filt.on{border-color:var(--acc);color:var(--acc);background:var(--accbg)}
.timeline{padding:6px 20px 0;position:relative}
.tl-line{position:absolute;left:31px;top:0;bottom:0;width:2px;border-radius:1px}
.spot{position:relative;margin-bottom:12px;padding-left:26px;animation:fadeUp .35s ease both}
.dot{position:absolute;left:5px;top:18px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg);transition:all .2s}
.dot.on{animation:pulse 1.5s ease infinite}
.sc{background:var(--card);border-radius:16px;padding:14px 16px;border:1px solid var(--border);transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sc.on{border-color:var(--acc);box-shadow:0 2px 8px rgba(194,97,44,.12)}
.detail{margin-top:10px;animation:fadeUp .2s ease}
.detail-inner{font-size:15px;color:var(--txt2);line-height:1.75;padding:12px 14px;background:var(--card2);border-radius:12px;border-left:3px solid var(--acc2)}
.tips{margin:10px 20px 0;background:var(--card);border-radius:16px;padding:14px 16px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.bgrid{margin:14px 20px 0;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.bgcell{background:var(--card);border-radius:12px;padding:10px 4px;text-align:center;border:1px solid var(--border)}
.swp{text-align:center;padding:18px 0;padding-bottom:max(20px,env(safe-area-inset-bottom,20px));font-size:13px;color:var(--dim2)}
.ring-wrap{text-align:center;margin-bottom:20px}
.ring-box{position:relative;width:150px;height:150px;margin:0 auto}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.bday{display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--card);border-radius:14px;padding:12px 14px;border:1px solid var(--border);animation:fadeUp .35s ease both;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.bbar{height:6px;border-radius:3px;background:var(--bg2);overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width .6s}
.visa-box{background:var(--card);border-radius:16px;padding:16px;margin:16px 0;border:1px solid #E8D5A0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sum-box{background:var(--card);border-radius:18px;padding:18px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.warn-box{font-size:14px;color:var(--warn);margin-top:12px;line-height:1.7;padding:10px 12px;background:#FEF2F0;border-radius:10px;border:1px solid #F5D5D0}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
</style>
</head>
