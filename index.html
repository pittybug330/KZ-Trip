<style>
:root{--bg:#0a0e14;--card:#111720;--card2:#151a22;--border:#1a2030;--txt:#d4d4d4;--dim:#6b7b8d;--acc:#53bdeb;--warn:#e74c3c;--gold:#f39c12;--ok:#2ecc71}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,'PingFang TC','Noto Sans TC','Helvetica Neue',sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{display:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}
.hdr{padding:max(12px,env(safe-area-inset-top,12px)) 16px 0;display:flex;justify-content:space-between;align-items:center}
.tabs{display:flex;gap:3px;background:var(--card2);border-radius:10px;padding:3px}
.tab{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;background:transparent;color:var(--dim);transition:all .2s}
.tab.on{background:var(--acc);color:var(--bg)}
.days{display:flex;gap:5px;padding:10px 16px;overflow-x:auto}
.day-btn{flex-shrink:0;width:46px;padding:5px 0;border-radius:11px;text-align:center;background:var(--card2);color:var(--dim);border:2px solid transparent;transition:all .2s}
.day-btn:active{transform:scale(.93)}
.day-btn.on{color:#fff}
.hero{margin:0 16px 10px;border-radius:16px;overflow:hidden;position:relative;height:120px}
.hero-bg{position:absolute;inset:0;opacity:.9}
.hero-c{position:relative;z-index:1;padding:14px 16px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.filters{display:flex;gap:5px;padding:0 16px 6px;overflow-x:auto;flex-wrap:wrap}
.filt{padding:3px 10px;border-radius:16px;font-size:10px;font-weight:600;background:var(--card2);color:#555;transition:all .15s}
.filt:active{transform:scale(.95)}
.timeline{padding:4px 16px 0;position:relative}
.tl-line{position:absolute;left:26px;top:0;bottom:0;width:2px;border-radius:1px}
.spot{position:relative;margin-bottom:8px;padding-left:20px;animation:fadeUp .35s ease both}
.dot{position:absolute;left:5px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);transition:all .2s}
.dot.on{animation:pulse 1.5s ease infinite}
.scard{border-radius:13px;padding:10px 12px;border:1px solid var(--border);transition:all .2s}
.scard.on{border-color:rgba(255,255,255,.15)}
.mono{font-family:'SF Mono','Menlo','Courier New',monospace}
.detail{margin-top:8px;animation:fadeUp .2s ease}
.detail-inner{font-size:12.5px;color:#8a95a0;line-height:1.7;padding:7px 9px;background:#0c1016;border-radius:9px;border-left:3px solid rgba(255,255,255,.1)}
.tips{margin:6px 16px 0;background:var(--card);border-radius:13px;padding:10px 12px;border:1px solid var(--border)}
.budget-grid{margin:10px 16px 0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.bg-cell{background:var(--card);border-radius:9px;padding:6px 2px;text-align:center;border:1px solid var(--border)}
.swipe-hint{text-align:center;padding:14px 0;padding-bottom:max(16px,env(safe-area-inset-bottom,16px));font-size:10px;color:#1a2030}
.ring-wrap{text-align:center;margin-bottom:16px}
.ring-box{position:relative;width:130px;height:130px;margin:0 auto}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.bday{display:flex;align-items:center;gap:7px;margin-bottom:5px;background:var(--card);border-radius:9px;padding:7px 9px;border:1px solid var(--border);animation:fadeUp .35s ease both}
.bbar{height:4px;border-radius:2px;background:var(--border);overflow:hidden}
.bfill{height:100%;border-radius:2px;transition:width .6s}
.visa-box{background:var(--card2);border-radius:12px;padding:12px;margin:12px 0;border:1px solid rgba(243,156,18,.2)}
.sum-box{background:linear-gradient(135deg,#0d2137,#0a1628);border-radius:14px;padding:14px;border:1px solid rgba(83,189,235,.13)}
.warn-box{font-size:10px;color:var(--warn);margin-top:8px;line-height:1.6;padding:6px 8px;background:rgba(231,76,60,.07);border-radius:7px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>
</head>

  let h=`
  <div class="hdr">
    <div>
      <div style="font-size:10px;color:var(--acc);letter-spacing:3px;font-weight:600" class="mono">KAZAKHSTAN 2026</div>
      <div style="font-size:17px;font-weight:700;margin-top:1px">🇰🇿 哈薩克 9天8夜</div>
    </div>
    <div class="tabs">
      <button class="tab ${curTab==="trip"?"on":""}" onclick="setTab('trip')">📅行程</button>
      <button class="tab ${curTab==="budget"?"on":""}" onclick="setTab('budget')">💰預算</button>
    </div>
  </div>`;

  if(curTab==="trip"){
    // Day pills
    h+=`<div class="days">`;
    D.forEach((dd,i)=>{
      h+=`<button class="day-btn ${curDay===i?"on":""}" style="${curDay===i?`border-color:${dd.cl};background:${dd.cl}22`:""}" onclick="goDay(${i})">
        <div style="font-size:15px">${dd.ic}</div>
        <div class="mono" style="font-size:10px;font-weight:700">${dd.n}</div>
        <div style="font-size:7px;opacity:.6">${dd.dt}</div>
      </button>`;
    });
    h+=`</div>`;

    // Hero
    h+=`<div class="hero"><div class="hero-bg" style="background:${d.gr}"></div>
    <div class="hero-c">
      <div><div class="mono" style="font-size:10px;color:rgba(255,255,255,.55);letter-spacing:2px">DAY ${d.n} — ${d.dt} (${d.wd})</div>
      <div style="font-size:19px;font-weight:900;color:#fff;margin-top:3px">${d.ic} ${d.th}</div></div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:11px;color:rgba(255,255,255,.65)">📍 ${d.ct}</span>
        <span style="font-size:11px;color:rgba(255,255,255,.65)">🌡️ ${d.wx}</span>
      </div>
    </div></div>`;

    // Filters
    const tags=[...new Set(d.sp.map(s=>s.g))];
    h+=`<div class="filters">
      <button class="filt" style="${curFlt==="all"?"background:#53bdeb20;color:#53bdeb":""}" onclick="setFlt('all')">全部</button>`;
    tags.forEach(tag=>{
      h+=`<button class="filt" style="${curFlt===tag?`background:${tC[tag]}20;color:${tC[tag]}`:""}" onclick="setFlt('${tag}')">${tL[tag]}</button>`;
    });
    h+=`</div>`;

    // Timeline
    h+=`<div class="timeline"><div class="tl-line" style="background:${d.cl}18"></div>`;
    fs.forEach((s,i)=>{
      const isO=curExp===i;
      h+=`<div class="spot" style="animation-delay:${i*.04}s" onclick="togExp(${i})">
        <div class="dot ${isO?"on":""}" style="background:${isO?d.cl:tC[s.g]||d.cl};${isO?`box-shadow:0 0 8px ${d.cl}66`:""}"></div>
        <div class="scard ${isO?"on":""}" style="background:${isO?"#151e28":"var(--card)"}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:5px">
                <span class="mono" style="font-size:10px;color:${d.cl};font-weight:600">${s.t}</span>
                <span style="font-size:8px;color:${tC[s.g]};font-weight:600">${tL[s.g]}</span>
              </div>
              <div style="font-size:13px;font-weight:600;margin-top:2px;color:#e0ddd8;line-height:1.3">${s.i} ${s.n}</div>
            </div>
            <div style="flex-shrink:0;margin-left:6px;text-align:right">
              ${s.c>0?`<span class="mono" style="font-size:10px;color:var(--gold);font-weight:600">$${fm(s.c)}</span>`:""}
              <div style="font-size:14px;color:#333;transition:transform .2s;transform:rotate(${isO?90:0}deg)">›</div>
            </div>
          </div>
          ${isO?`<div class="detail"><div class="detail-inner" style="border-left-color:${d.cl}33">${s.d}</div></div>`:""}
        </div>
      </div>`;
    });
    h+=`</div>`;

    // Tips
    if(d.tp.length){
      h+=`<div class="tips"><div style="font-size:11px;font-weight:700;margin-bottom:6px;color:var(--gold)">💡 小提醒</div>`;
      d.tp.forEach(t=>{h+=`<div style="font-size:11px;color:var(--dim);margin-bottom:3px;padding-left:6px;line-height:1.5">• ${t}</div>`;});
      h+=`</div>`;
    }

    // Budget grid
    h+=`<div class="budget-grid">`;
    [{l:"門票",v:d.bg.tk,e:"🎫"},{l:"交通",v:d.bg.tr,e:"🚗"},{l:"餐飲",v:d.bg.fd,e:"🍽️"},{l:"住宿",v:d.bg.ht,e:"🏨"},{l:"其他",v:d.bg.ot,e:"📦"}].forEach(it=>{
      h+=`<div class="bg-cell"><div style="font-size:12px">${it.e}</div><div style="font-size:7px;color:#555;margin-top:1px">${it.l}</div>
      <div class="mono" style="font-size:9px;font-weight:700;color:${it.v>0?"var(--txt)":"#1a2030"};margin-top:1px">${it.v>0?"$"+fm(it.v):"—"}</div></div>`;
    });
    h+=`</div><div class="swipe-hint">← 左右滑動切換天數 →</div>`;

  } else {
    // BUDGET
    h+=`<div style="height:calc(100vh - 56px);overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch">`;

    // Ring
    const pct1=(allT/TOT)*264,pct2=(FL/TOT)*264;
    h+=`<div class="ring-wrap"><div class="ring-box">
      <svg viewBox="0 0 100 100" style="transform:rotate(-90deg)">
        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border)" stroke-width="8"/>
        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--acc)" stroke-width="8" stroke-dasharray="${pct1} 264" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--warn)" stroke-width="8" stroke-dasharray="${pct2} 264" stroke-dashoffset="${-pct1}" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <div style="font-size:8px;color:#555">剩餘</div>
        <div class="mono" style="font-size:16px;font-weight:700;color:${remain<10000?"var(--warn)":"var(--ok)"}">${remain.toLocaleString()}</div>
        <div style="font-size:8px;color:#555">TWD</div>
      </div>
    </div>
    <div style="display:flex;justify-content:center;gap:14px;margin-top:8px;font-size:9px;color:#555">
      <span>🔵哈薩克</span><span>🔴機票</span><span>⚫未用</span>
    </div></div>`;

    // Daily
    h+=`<div style="font-size:12px;font-weight:700;margin-bottom:8px">📊 每日費用</div>`;
    D.forEach((dd,i)=>{
      const dt=dT(dd.bg);
      h+=`<div class="bday" style="animation-delay:${i*.03}s">
        <div style="width:32px;text-align:center;flex-shrink:0"><div style="font-size:13px">${dd.ic}</div><div style="font-size:7px;color:#555">D${dd.n}</div></div>
        <div style="flex:1"><div style="font-size:10px;font-weight:500;color:#7a8694;margin-bottom:2px">${dd.th}</div>
        <div class="bbar"><div class="bfill" style="background:${dd.gr};width:${Math.min((dt/8000)*100,100)}%"></div></div></div>
        <div class="mono" style="font-size:11px;font-weight:700;color:var(--acc);flex-shrink:0;min-width:46px;text-align:right">${dt.toLocaleString()}</div>
      </div>`;
    });

    // Visa
    h+=`<div class="visa-box">
      <div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:6px">🛂 簽證費用</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--dim)">邀請函LOI（已付）</span><span class="mono">${VL.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--dim)">eVisa/落地簽（預估）</span><span class="mono">${VV.toLocaleString()}</span></div>
    </div>`;

    // Summary
    h+=`<div class="sum-box">
      <div style="font-size:11px;color:#555;margin-bottom:8px">💰 全程預算 (TWD)</div>`;
    [{l:"總預算",v:TOT,c:"var(--txt)",s:"+"},{l:"機票",v:FL,c:"var(--warn)",s:"−"},{l:"哈薩克含簽證",v:allT,c:"var(--warn)",s:"−"}].forEach(r=>{
      h+=`<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:var(--dim)">${r.l}</span>
        <span class="mono" style="font-weight:600;color:${r.c}">${r.s}${r.v.toLocaleString()}</span></div>`;
    });
    h+=`<div style="border-top:1px solid #53bdeb22;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;font-weight:700">剩餘（烏茲別克12天）</span>
      <span class="mono" style="font-size:16px;font-weight:700;color:${remain<10000?"var(--warn)":"var(--ok)"}">${remain.toLocaleString()}</span>
    </div>`;
    if(remain<10000){
      h+=`<div class="warn-box">⚠️ 烏茲別克段預算緊。建議：Tour省TWD2-3K、住宿TWD600-700/晚、取消高價晚餐省TWD500+。</div>`;
    }
    h+=`</div><div style="height:max(30px,env(safe-area-inset-bottom,30px))"></div></div>`;
  }

  app.innerHTML=h;
}

// ─── EVENT HANDLERS ───
window.goDay=function(i){curDay=i;curExp=null;curFlt="all";render()};
window.setTab=function(t){curTab=t;render()};
window.setFlt=function(f){curFlt=curFlt===f&&f!=="all"?"all":f;render()};
window.togExp=function(i){curExp=curExp===i?null:i;render()};

// Swipe
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener("touchend",e=>{
  if(curTab!=="trip")return;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&curDay<8){curDay++;curExp=null;curFlt="all";render()}
    if(dx>0&&curDay>0){curDay--;curExp=null;curFlt="all";render()}
  }
},{passive:true});

render();
</script>
</body>
</html>
